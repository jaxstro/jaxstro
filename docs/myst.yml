version: 1
project:
  id: jaxstro-docs
  title: jaxstro
  description: >-
    Evidence-first JAX infrastructure for differentiable science: an astro-first,
    science-general foundation for units, constants, coordinates, AD-safe
    numerics, and validation.
  github: https://github.com/drannarosen/jaxstro
  keywords:
    - JAX
    - automatic differentiation
    - astrophysics
    - numerics
    - units
  bibliography:
    - 99-bibliography/references.bib
  exclude:
    - plans/**
    - _build/**
  # The ported ADRs (30-decisions/) keep their original working-log frontmatter
  # keys (id/status/supersedes/decided_by/last_read) verbatim. MyST's page-
  # frontmatter schema does not know these keys; silence the resulting per-page
  # warning rather than strip the provenance. (Documented pattern for custom ADR
  # frontmatter — myst-projects-and-workflows.)
  error_rules:
    - rule: valid-page-frontmatter
      severity: ignore
  math:
    '\Msun': '\mathrm{M}_\odot'
    '\Rsun': '\mathrm{R}_\odot'
    '\Lsun': '\mathrm{L}_\odot'
    '\erg': '\mathrm{erg}'
  numbering:
    headings: false
    figure:
      enabled: true
    equation:
      enabled: true
    table:
      enabled: true
  toc:
    - file: index.md
    - title: Getting started
      children:
        - file: 00-getting-started/index.md
    - title: Theory — AD-safe numerics
      children:
        - file: 10-theory/index.md
        - file: 10-theory/rootfinding.md
        - file: 10-theory/cumulative-trapz.md
        - file: 10-theory/quadrature.md
        - file: 10-theory/interpolation.md
        - file: 10-theory/regular-grid.md
        - file: 10-theory/bsplines.md
        - file: 10-theory/linear-algebra.md
        - file: 10-theory/autodiff.md
        - file: 10-theory/geometry.md
        - file: 10-theory/distributions.md
        - file: 10-theory/optimization.md
        - file: 10-theory/ode.md
        - file: 10-theory/operators.md
        - file: 10-theory/special-functions.md
        - file: 10-theory/grids.md
    - title: Architecture
      children:
        - file: 20-architecture/index.md
        - file: 20-architecture/science-general-vision.md
        - file: 20-architecture/atmosphere-capabilities.md
        - file: 20-architecture/spectra-data-architecture.md
    - title: Decisions (ADRs)
      children:
        - file: 30-decisions/index.md
        - file: 30-decisions/0001-thin-foundation-posture.md
        - file: 30-decisions/0002-adopt-equinox-foundation.md
